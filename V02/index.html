<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .think-box {
            height: 180px;
            overflow: auto;
            background: #f9fafb;
            border-radius: 8px;
            padding: 10px;
        }
        .think-line {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.6s forwards;
            margin-bottom: 4px;
            font-size: 13px;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .report-part {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }
        .report-part.show { opacity: 1; transform: translateY(0); }
        .spin-loader {
            width: 30px; height: 30px;
            border: 3px solid #eee;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { cursor: pointer; }
        .login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 24px; border-radius: 10px;
            width: 320px; box-shadow: 0 0 10px rgba(0,0,0,0.2); position: relative;
        }
        .login-close {
            position: absolute; top: 12px; right: 12px;
            font-size: 18px; color: #666; cursor: pointer; background: none; border: none;
        }
        .login-close:hover { color: #000; }
        .nav-btn.active { color: #4f46e5; font-weight: 600; border-bottom: 2px solid #4f46e5; }
    </style>
</head>
<body class="bg-gray-50">

<div class="login-modal" id="loginModal">
    <div class="login-box">
        <button class="login-close" id="closeLoginModal">&times;</button>
        <h3 class="text-lg font-bold mb-4" data-i18n="login_title">用户登录</h3>
        <div class="mb-3">
            <label class="block text-sm mb-1" data-i18n="username">账号</label>
            <input id="username" class="w-full border p-2 rounded" type="text" placeholder="请输入账号" data-i18n-placeholder="username_placeholder">
        </div>
        <div class="mb-4">
            <label class="block text-sm mb-1" data-i18n="password">密码</label>
            <input id="password" class="w-full border p-2 rounded" type="password" placeholder="请输入密码" data-i18n-placeholder="password_placeholder">
        </div>
        <button id="loginSubmit" class="bg-indigo-600 text-white w-full py-2 rounded" data-i18n="login_btn">登录</button>
    </div>
</div>

<div class="sticky top-0 z-50 bg-white shadow">
    <div class="px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i class="fa fa-music text-xl text-indigo-600"></i>
            <span class="font-bold" data-i18n="app_name">AI音乐生成器</span>
        </div>
        <div class="flex items-center gap-5 text-sm font-medium">
            <button class="nav-btn px-2 py-1 hover:text-indigo-600 transition-colors" data-page="page1" data-i18n="menu_analysis">数据分析</button>
            <button class="nav-btn px-2 py-1 hover:text-indigo-600 transition-colors" data-page="about" data-i18n="menu_about">关于我们</button>
            <button class="nav-btn px-2 py-1 hover:text-indigo-600 transition-colors" data-page="contact" data-i18n="menu_contact">联系我们</button>
            
            <select id="langSelect" class="border p-1 text-sm rounded">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en">English</option>
            </select>

            <div class="relative flex items-center gap-2">
                <div class="text-gray-600" data-i18n="login">登录</div>
                <button id="avatarBtn" class="w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center">
                    <i class="fa fa-user"></i>
                </button>
                <div id="userPanel" class="hidden absolute top-10 right-0 bg-white shadow-md p-4 rounded-md w-48 z-50">
                    <p class="text-sm mb-2" data-i18n="token_left">剩余生成次数：<span id="tokenLeft">10</span></p>
                    <button id="logoutBtn" class="bg-red-500 text-white text-xs px-3 py-1 rounded w-full" data-i18n="logout">退出登录</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto px-4 py-6">
    <div id="page1" class="page-content block">
        <div class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-6 rounded-xl mb-6">
            <h1 class="text-xl font-bold" data-i18n="analysis_title">AI音乐分析工具</h1>
            <p data-i18n="analysis_desc">选择分析元素与调式，生成Billboard报告</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <label class="flex items-center gap-2 p-2 border rounded"><input type="checkbox" checked> <span data-i18n="song_name">歌曲名称</span></label>
                <label class="flex items-center gap-2 p-2 border rounded"><input type="checkbox" checked> <span data-i18n="lyrics">歌词</span></label>
                <label class="flex items-center gap-2 p-2 border rounded"><input type="checkbox" checked> <span data-i18n="mode">调式</span></label>
                <label class="flex items-center gap-2 p-2 border rounded"><input type="checkbox" checked> <span data-i18n="chord">和弦</span></label>
            </div>
            <div class="flex gap-4 mb-4">
                <label class="flex items-center gap-2"><input type="radio" name="mode" value="major" checked> <span data-i18n="major">大调</span></label>
                <label class="flex items-center gap-2"><input type="radio" name="mode" value="minor"> <span data-i18n="minor">小调</span></label>
            </div>
            <button id="toPage2" class="bg-indigo-600 text-white px-4 py-2 rounded" data-i18n="get_analysis">获取2025 Billboard分析</button>
        </div>
    </div>

    <div id="page2" class="page-content hidden">
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <div class="flex justify-between mb-4">
                <h2 class="font-bold text-lg" data-i18n="report_title">2025 Billboard 分析报告</h2>
                <button id="back1" class="text-indigo-600 border bg-gray-50 px-3 py-1 rounded" data-i18n="back">返回</button>
            </div>
            <div class="mb-4">
                <h3 class="text-sm font-semibold mb-1">AI Chain-of-Thought Reasoning</h3>
                <div class="think-box" id="thinkBox"></div>
            </div>
            <div class="mb-6">
                <h3 class="font-semibold mb-2" data-i18n="analysis_summary">分析总结报告</h3>
                <div id="reportContainer" class="space-y-2 text-sm"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6" id="chartArea" style="display:none">
                <div class="h-64">

                </div>
                <div class="h-64">

            <button id="toPage3" class="bg-indigo-600 text-white px-4 py-2 rounded" data-i18n="to_generate">前往AI音乐生成</button>
        </div>
    </div>

    <div id="page3" class="page-content hidden">
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <div class="flex justify-between mb-4">

                <button id="back2" class="text-indigo-600 border bg-gray-50 px-3 py-1 rounded" data-i18n="back">返回</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block mb-1 font-medium" data-i18n="lyric_lang">歌词语言</label>
                    <select id="genLang" class="w-full border p-2 rounded">
                        <option value="cn" data-i18n="cn">中文</option>
                        <option value="en" data-i18n="en">英文</option>
                        <option value="bi" data-i18n="bi">中英双语</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1 font-medium" data-i18n="style">风格</label>
                    <select id="genStyle" class="w-full border p-2 rounded">
                        <option value="pop">Pop</option><option value="rock">Rock</option><option value="rnb">R&B</option><option value="jazz">Jazz</option><option value="rap">Rap</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1 font-medium" data-i18n="key">调</label>
                    <select id="genKey" class="w-full border p-2 rounded">
                        <option value="C">C</option><option value="G">G</option><option value="D">D</option><option value="A">A</option><option value="E">E</option><option value="Am">Am</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1 font-medium" data-i18n="mode">调式</label>
                    <select id="genMode" class="w-full border p-2 rounded" disabled>
                        <option value="major" data-i18n="major">大调</option><option value="minor" data-i18n="minor">小调</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1 font-medium" data-i18n="bpm">BPM</label>
                    <select id="genBpm" class="w-full border p-2 rounded">
                        <option value="60">60</option><option value="80">80</option><option value="100">100</option><option value="120">120</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="block mb-1 font-medium" data-i18n="custom_lyrics">自定义歌词 / 主题</label>
                <textarea id="genOwnLyric" class="w-full border p-2 rounded" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="block mb-1 font-medium" data-i18n="ai_prompt">AI生成提示词</label>
                <textarea id="genPrompt" class="w-full border p-2 rounded" rows="3"></textarea>
            </div>
            <div class="flex gap-2">
                <button id="genByAnalysis" class="flex-1 bg-green-500 text-white py-2 rounded" data-i18n="gen_by_analysis">根据分析一键生成</button>
                <button id="startGen" class="flex-1 bg-indigo-600 text-white py-2 rounded" data-i18n="generate_music">生成音乐</button>
            </div>
        </div>
    </div>

    <div id="about" class="page-content hidden">
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4" data-i18n="about_title">关于我们</h2>
            <p class="mb-2 whitespace-pre-line" data-i18n="about_content"></p>
        </div>
    </div>

    <div id="contact" class="page-content hidden">
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4" data-i18n="contact_title">联系我们</h2>
            <div class="space-y-3 text-sm">
                <p><strong data-i18n="contact_addr_label"></strong><br><span data-i18n="contact_addr"></span></p>
                <p><strong data-i18n="contact_email_label"></strong> <span data-i18n="contact_email"></span></p>
                <p><strong data-i18n="contact_tel_label"></strong> <span data-i18n="contact_tel"></span></p>
            </div>
        </div>
    </div>
</div>

<div id="progressModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
    <div class="bg-white p-8 rounded-xl flex flex-col items-center">
        <h3 class="text-center font-bold mb-4" data-i18n="generating">音乐生成中</h3>
        <div class="spin-loader"></div>
    </div>
</div>

let isLoggedIn = false;
let selectedMode = 'major';
let tokenCount = 10;
let currentLang = localStorage.getItem('preferredLang') || 'zh-CN';
let currentPage = 'page1';
let lastWorkPage = 'page1';

const loginModal = document.getElementById('loginModal');
const userPanel = document.getElementById('userPanel');
const closeLoginModal = document.getElementById('closeLoginModal');
const langSelect = document.getElementById('langSelect');
const navBtns = document.querySelectorAll('.nav-btn');
const pageContents = document.querySelectorAll('.page-content');

document.addEventListener('DOMContentLoaded', () => {
    langSelect.value = currentLang;
    updateLanguage();

    langSelect.addEventListener('change', (e) => {
        currentLang = e.target.value;
        localStorage.setItem('preferredLang', currentLang);
        updateLanguage();
    });

    navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.getAttribute('data-page');
            if (target === 'about' || target === 'contact') {
                if (currentPage === 'about' || currentPage === 'contact') {
                    switchPage(lastWorkPage);
                } else {
                    lastWorkPage = currentPage;
                    switchPage(target);
                }
            } else {
                switchPage(target);
            }
        });
    });

    document.body.addEventListener('click', (e) => {
        if (!e.target.closest('.nav-btn') && !e.target.closest('.page-content')) {
            if (currentPage === 'about' || currentPage === 'contact') {
                switchPage(lastWorkPage);
            }
        }
    });

    initLogin();
    initPageNavigation();
});

function updateLanguage() {
    const t = translations[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (t[k]) el.textContent = t[k];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const k = el.getAttribute('data-i18n-placeholder');
        if (t[k]) el.placeholder = t[k];
    });
    document.documentElement.lang = currentLang;
}

function switchPage(id) {
    pageContents.forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    navBtns.forEach(b => b.classList.toggle('active', b.getAttribute('data-page') === id));
    currentPage = id;
}

function initLogin() {
    document.getElementById('avatarBtn').onclick = () => {
        isLoggedIn ? userPanel.classList.toggle('hidden') : loginModal.style.display = 'flex';
    };
    closeLoginModal.onclick = () => loginModal.style.display = 'none';
    loginModal.onclick = e => e.target === loginModal && (loginModal.style.display = 'none');
    document.getElementById('loginSubmit').onclick = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if (u === 'admin' && p === '123456') {
            isLoggedIn = true; loginModal.style.display = 'none'; userPanel.classList.remove('hidden');
            alert(translations[currentLang].login + ' Success');
        } else alert(translations[currentLang].username + ' / ' + translations[currentLang].password + ' Error');
    };
    document.getElementById('logoutBtn').onclick = () => {
        isLoggedIn = false; userPanel.classList.add('hidden');
        alert(translations[currentLang].logout + ' Success');
    };
}

function initPageNavigation() {
    const delay = ms => new Promise(r => setTimeout(r, ms));
    document.getElementById('toPage2').onclick = async function () {
        const btn = this, txt = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> ' + translations[currentLang].generating;
        btn.disabled = true;
        selectedMode = document.querySelector('input[name="mode"]:checked').value;
        await delay(2000);
        switchPage('page2');
        btn.innerHTML = txt; btn.disabled = false;
        await startLLMThinking();
    };
    document.getElementById('back1').onclick = () => switchPage('page1');
    document.getElementById('toPage3').onclick = () => { switchPage('page3'); document.getElementById('genMode').value = selectedMode; };
    document.getElementById('back2').onclick = () => switchPage('page2');
    document.getElementById('genByAnalysis').onclick = () => {
        selectedMode === 'major' ? (
            document.getElementById('genKey').value='C',
            document.getElementById('genMode').value='major',
            document.getElementById('genStyle').value='pop',
            document.getElementById('genBpm').value='120'
        ) : (
            document.getElementById('genKey').value='Am',
            document.getElementById('genMode').value='minor',
            document.getElementById('genStyle').value='rnb',
            document.getElementById('genBpm').value='80'
        );
    };
    document.getElementById('startGen').onclick = () => {
        if (!isLoggedIn) { alert(translations[currentLang].login); loginModal.style.display='flex'; return; }
        if (tokenCount<=0) { alert('Insufficient tokens'); return; }
        tokenCount--; document.getElementById('tokenLeft').innerText = tokenCount;
        const m = document.getElementById('progressModal');
        m.classList.remove('hidden');
        setTimeout(()=>{ m.classList.add('hidden'); alert(translations[currentLang].generate_music + ' Completed'); },4000);
    };
}

async function startLLMThinking(){
    const thinkBox = document.getElementById('thinkBox');
    const reportContainer = document.getElementById('reportContainer');
    thinkBox.innerHTML = ''; reportContainer.innerHTML = '';
    const t = translations[currentLang];
    const modeLabel = selectedMode === 'major' ? t.major : t.minor;
    const thoughts = [
        "解析用户需求：对2025 Billboard热门歌曲进行音乐特征分析",
        "加载音乐知识图谱与Billboard 2025数据集...",
        `按筛选条件，仅保留${modeLabel}曲目`,
        "对曲目进行token化：提取调式、和弦、节奏、情绪特征",
        `统计${modeLabel}调性分布与高频和弦进行`,
        `${modeLabel}曲目情绪偏向：${selectedMode === 'major' ? 'positive' : 'emotional'}`,
        "对比历史趋势，识别流行规律",
        "剔除低质样本，保证分析有效性",
        "生成结构化数据：调性、和弦、风格、BPM",
        "构建可视化图表，输出最终报告"
    ];
    for (const txt of thoughts) {
        const line = document.createElement('div');
        line.className = 'think-line'; line.innerText = txt;
        thinkBox.appendChild(line); thinkBox.scrollTop = thinkBox.scrollHeight;
        await new Promise(r => setTimeout(r, 700));
    }
    const reports = [
        `基于2025 Billboard全球热门单曲，覆盖主流风格`,
        `完成${modeLabel}专项分析，结果精准聚焦`,
        `${modeLabel}调性高度集中，符合商业音乐创作规律`,
        `经典和弦进行依旧是${modeLabel}主流选择`,
        `${modeLabel}在情绪、结构、旋律上具备显著共性`
    ];
    for (const txt of reports) {
        const p = document.createElement('div');
        p.className = 'report-part'; p.innerText = txt;
        reportContainer.appendChild(p);
        await new Promise(r => setTimeout(r, 300));
        p.classList.add('show');
    }
    document.getElementById('chartArea').style.display = 'grid';
    const keys = selectedMode === 'major' ? ['C','G','D','F'] : ['Am','Em','Dm','Bm'];
    new Chart(document.getElementById('chartKey'),{
        type:'pie', data:{labels:keys,datasets:[{data:[5,3,2,1],backgroundColor:['#6366f1','#8b5cf6','#ec4899','#10b981']}]}
    });
    const chords = selectedMode === 'major' ? ['1-5-6-4','1-6-4-5','1-4-5'] : ['6-4-1-5','6-2-5-1','2-5-1'];
    new Chart(document.getElementById('chartChord'),{
        type:'bar', data:{labels:chords,datasets:[{label:'Count',data:[6,4,2],backgroundColor:'#6366f1'}]},
        options:{scales:{y:{beginAtZero:true}}}
    });
}
